<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="{{styleUri}}" />
  </head>
  <body>
    <div class="container">
      <h2>Whitespace Ignore Search</h2>

      <div class="section-info">
        <p class="info">
          {{infoSpacerPrefix}}
          <span class="spacer-container">
            <input
              type="text"
              id="spacerPattern"
              class="inline-input"
              value="{{spacerPattern}}"
            />
            <button id="resetSpacer" class="vscode-btn-secondary mini-reset">
              {{btnReset}}
            </button>
          </span>
          {{infoSpacerSuffix}}
        </p>
        <p class="info">
          <input
            type="text"
            id="startDelimiter"
            class="inline-input"
            value="{{startDelim}}"
          />
          {{infoDelimMid}}
          <input
            type="text"
            id="endDelimiter"
            class="inline-input"
            value="{{endDelim}}"
          />
          {{infoDelimSuffix}}
        </p>
      </div>

      <div class="editor-group">
        <textarea id="input" class="editor"></textarea>
        <div id="preview" class="output-preview"></div>
      </div>

      <div class="action-area">
        <button id="searchBtn" class="vscode-btn-primary">{{btnSearch}}</button>
      </div>
    </div>
    <script src="{{scriptUri}}"></script>
  </body>
</html>
